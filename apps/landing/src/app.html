<div class="page-shell">
  <section class="hero-card">
    <header class="topbar">
      <a class="brand" href="#">test1</a>
      <a class="top-link" href="#" data-app-link>Open App</a>
    </header>

    <div class="hero-layout">
      <div class="hero-copy">
        <p class="eyebrow">Vanilla JS landing page</p>
        <h1>Simple now, ready to grow later.</h1>
        <p class="lede">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do
          eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad
          minim veniam, quis nostrud exercitation ullamco laboris.
        </p>
      </div>

      <div class="carousel" aria-label="Featured images carousel">
        <div class="carousel-viewport">
          <figure class="carousel-slide is-active" data-slide>
            <img
              src="https://picsum.photos/seed/canyon/1200/800"
              alt="Sunlit canyon cliffs"
            />
          </figure>
          <figure class="carousel-slide" data-slide>
            <img
              src="https://picsum.photos/seed/facade/1200/800"
              alt="Glass building facade at dusk"
            />
          </figure>
          <figure class="carousel-slide" data-slide>
            <img
              src="https://picsum.photos/seed/coastline/1200/800"
              alt="Coastal road near the sea"
            />
          </figure>
        </div>

        <div class="carousel-controls">
          <button
            type="button"
            class="carousel-button"
            data-action="prev"
            aria-label="Previous image"
          >
            Prev
          </button>
          <div class="carousel-dots" aria-label="Choose image">
            <button
              type="button"
              class="carousel-dot is-active"
              data-slide-index="0"
              aria-label="Go to slide 1"
              aria-current="true"
            ></button>
            <button
              type="button"
              class="carousel-dot"
              data-slide-index="1"
              aria-label="Go to slide 2"
              aria-current="false"
            ></button>
            <button
              type="button"
              class="carousel-dot"
              data-slide-index="2"
              aria-label="Go to slide 3"
              aria-current="false"
            ></button>
          </div>
          <button
            type="button"
            class="carousel-button"
            data-action="next"
            aria-label="Next image"
          >
            Next
          </button>
        </div>
      </div>
    </div>
  </section>
</div>
